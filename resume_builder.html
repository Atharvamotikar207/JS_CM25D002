<!DOCTYPE html>
<html>
<head>
  <title>Resume Builder</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      background: #3498db;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2980b9;
    }

    #resume {
      margin-top: 20px;
      padding: 15px;
      background: #ecf0f1;
      border-radius: 8px;
    }

    h3 {
      color: #2c3e50;
    }

    h4 {
      color: #3498db;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<h1>Resume Builder</h1>

<div class="container">

  <input id="name" placeholder="Full Name">
  <input id="phone" placeholder="Phone Number">
  <input id="email" placeholder="Email">
  <input id="address" placeholder="Address">
  <input id="education" placeholder="Education">
  <textarea id="experience" placeholder="Experience"></textarea>
  <input id="skills" placeholder="Skills">

  <button onclick="generate()">Generate Resume</button>

  <div id="resume"></div>

</div>

<script>
function generate() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let email = document.getElementById("email").value;
  let address = document.getElementById("address").value;
  let education = document.getElementById("education").value;
  let experience = document.getElementById("experience").value;
  let skills = document.getElementById("skills").value;

  if (!name || !phone || !email || !address || !education) {
    alert("Please fill all required fields!");
    return;
  }

  document.getElementById("resume").innerHTML = `
    <h3>${name}</h3>
    <p>${phone} | ${email} | ${address}</p>

    <h4>Education</h4>
    <p>${education}</p>

    ${experience ? `<h4>Experience</h4><p>${experience}</p>` : ""}

    ${skills ? `<h4>Skills</h4><p>${skills}</p>` : ""}
  `;
}
</script>

</body>
</html>
